<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Next Step – Background</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep:    #160d2a;
    --bg-mid:     #1e1040;
    --orange:     #e8682a;
    --orange-dim: #b84f1a;
    --white:      #f0eaf8;
    --purple-glow:#7b3fbf;
  }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: var(--bg-deep);
    font-family: 'Segoe UI', sans-serif;
    position: relative;
  }

  /* ── RADIAL GLOW LAYERS ── */
  .glow-center {
    position: absolute;
    width: 900px; height: 900px;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(123,63,191,.28) 0%, transparent 70%);
    filter: blur(60px);
    pointer-events: none;
  }
  .glow-left {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    top: 60%; left: -100px;
    background: radial-gradient(circle, rgba(232,104,42,.18) 0%, transparent 70%);
    filter: blur(80px);
    pointer-events: none;
  }
  .glow-right {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    top: -80px; right: 80px;
    background: radial-gradient(circle, rgba(123,63,191,.22) 0%, transparent 70%);
    filter: blur(70px);
    pointer-events: none;
  }

  /* ── GRID LINES ── */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }

  /* ── DIAGONAL ACCENT LINES ── */
  .diag-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    opacity: .18;
  }

  /* ── DOT GRID OVERLAY ── */
  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,.08) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── NOISE GRAIN ── */
  .grain {
    position: absolute;
    inset: 0;
    opacity: .045;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
  }

  /* ── GEOMETRIC NODE NETWORK ── */
  .network-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    opacity: .55;
  }

  /* ── LOGO AREA ── */
  .logo-wrap {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    gap: 22px;
    filter: drop-shadow(0 0 36px rgba(232,104,42,.35));
  }

  /* Icon – replicated from screenshot */
  .icon-svg {
    width: 62px;
    height: 72px;
  }

  .logo-text {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: .04em;
    color: var(--white);
    text-transform: capitalize;
    font-family: 'Franklin Gothic Heavy', 'Arial Black', Impact, sans-serif;
    line-height: 1;
    text-shadow:
      0 0 60px rgba(232,104,42,.25),
      0 2px 4px rgba(0,0,0,.6);
  }

  /* ── BOTTOM TAGLINE ── */
  .tagline {
    position: absolute;
    bottom: 68px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(240,234,248,.28);
    font-size: 13px;
    letter-spacing: .35em;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    white-space: nowrap;
  }

  /* ── CORNER BRACKETS ── */
  .corner {
    position: absolute;
    width: 48px; height: 48px;
    opacity: .35;
  }
  .corner--tl { top: 40px; left: 40px; border-top: 2px solid var(--orange); border-left: 2px solid var(--orange); }
  .corner--tr { top: 40px; right: 40px; border-top: 2px solid var(--orange); border-right: 2px solid var(--orange); }
  .corner--bl { bottom: 40px; left: 40px; border-bottom: 2px solid var(--orange); border-left: 2px solid var(--orange); }
  .corner--br { bottom: 40px; right: 40px; border-bottom: 2px solid var(--orange); border-right: 2px solid var(--orange); }

  /* ── HORIZONTAL RULE ── */
  .h-rule {
    position: absolute;
    left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,104,42,.4) 30%, rgba(123,63,191,.5) 70%, transparent);
  }
  .h-rule--top    { top: 140px; }
  .h-rule--bottom { bottom: 140px; }

  /* floating particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--orange);
    opacity: 0;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(0) scale(1); opacity: .55; }
    100% { transform: translateY(-340px) scale(.3); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Background layers -->
<div class="glow-center"></div>
<div class="glow-left"></div>
<div class="glow-right"></div>
<div class="grid"></div>
<div class="dots"></div>
<div class="grain"></div>

<!-- Diagonal accent lines -->
<svg class="diag-svg" viewBox="0 0 1920 1080" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <line x1="0" y1="1080" x2="600" y2="0"  stroke="#e8682a" stroke-width="1"/>
  <line x1="200" y1="1080" x2="800" y2="0"  stroke="#7b3fbf" stroke-width="1"/>
  <line x1="1320" y1="0" x2="1920" y2="1080" stroke="#e8682a" stroke-width="1"/>
  <line x1="1120" y1="0" x2="1720" y2="1080" stroke="#7b3fbf" stroke-width="1"/>
</svg>

<!-- Node network -->
<svg class="network-svg" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ng" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#e8682a" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#7b3fbf" stop-opacity=".4"/>
    </radialGradient>
  </defs>
  <!-- Connections -->
  <g stroke="url(#ng)" stroke-width=".8" fill="none" opacity=".5">
    <line x1="120" y1="200" x2="340" y2="380"/>
    <line x1="340" y1="380" x2="180" y2="540"/>
    <line x1="340" y1="380" x2="520" y2="260"/>
    <line x1="520" y1="260" x2="700" y2="400"/>
    <line x1="700" y1="400" x2="860" y2="280"/>
    <line x1="1060" y1="300" x2="1200" y2="480"/>
    <line x1="1200" y1="480" x2="1400" y2="360"/>
    <line x1="1400" y1="360" x2="1600" y2="500"/>
    <line x1="1600" y1="500" x2="1780" y2="380"/>
    <line x1="1600" y1="500" x2="1650" y2="720"/>
    <line x1="180" y1="700" x2="360" y2="820"/>
    <line x1="360" y1="820" x2="540" y2="700"/>
    <line x1="1300" y1="700" x2="1500" y2="820"/>
    <line x1="1500" y1="820" x2="1700" y2="750"/>
  </g>
  <!-- Nodes -->
  <g fill="none">
    <rect x="116"  y="196"  width="8" height="8" stroke="#e8682a" stroke-width="1.2"/>
    <rect x="336"  y="376"  width="8" height="8" stroke="#e8682a" stroke-width="1.2"/>
    <rect x="516"  y="256"  width="8" height="8" stroke="#7b3fbf" stroke-width="1.2"/>
    <rect x="696"  y="396"  width="8" height="8" stroke="#e8682a" stroke-width="1.2"/>
    <rect x="856"  y="276"  width="8" height="8" stroke="#7b3fbf" stroke-width="1.2"/>
    <rect x="176"  y="536"  width="8" height="8" stroke="#7b3fbf" stroke-width="1.2"/>
    <rect x="1056" y="296"  width="8" height="8" stroke="#e8682a" stroke-width="1.2"/>
    <rect x="1196" y="476"  width="8" height="8" stroke="#7b3fbf" stroke-width="1.2"/>
    <rect x="1396" y="356"  width="8" height="8" stroke="#e8682a" stroke-width="1.2"/>
    <rect x="1596" y="496"  width="8" height="8" stroke="#7b3fbf" stroke-width="1.2"/>
    <rect x="1776" y="376"  width="8" height="8" stroke="#e8682a" stroke-width="1.2"/>
    <rect x="1646" y="716"  width="8" height="8" stroke="#7b3fbf" stroke-width="1.2"/>
    <rect x="176"  y="696"  width="8" height="8" stroke="#e8682a" stroke-width="1.2"/>
    <rect x="356"  y="816"  width="8" height="8" stroke="#7b3fbf" stroke-width="1.2"/>
    <rect x="536"  y="696"  width="8" height="8" stroke="#e8682a" stroke-width="1.2"/>
    <rect x="1296" y="696"  width="8" height="8" stroke="#7b3fbf" stroke-width="1.2"/>
    <rect x="1496" y="816"  width="8" height="8" stroke="#e8682a" stroke-width="1.2"/>
    <rect x="1696" y="746"  width="8" height="8" stroke="#7b3fbf" stroke-width="1.2"/>
  </g>
</svg>

<!-- Corner brackets -->
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<!-- Horizontal rules -->
<div class="h-rule h-rule--top"></div>
<div class="h-rule h-rule--bottom"></div>

<!-- Logo -->
<div class="logo-wrap">
  <!-- Reconstructed icon from screenshot -->
  <svg class="icon-svg" viewBox="0 0 62 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- top square -->
    <rect x="36" y="2" width="14" height="14" stroke="#e8682a" stroke-width="2.5"/>
    <!-- bottom square -->
    <rect x="36" y="56" width="14" height="14" stroke="#e8682a" stroke-width="2.5"/>
    <!-- left arrow < -->
    <polyline points="30,9 8,36 30,63" stroke="#e8682a" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
    <!-- connector lines from squares to arrow point -->
    <line x1="36" y1="9"  x2="30" y2="9"  stroke="#e8682a" stroke-width="2.5"/>
    <line x1="36" y1="63" x2="30" y2="63" stroke="#e8682a" stroke-width="2.5"/>
  </svg>
  <span class="logo-text">Next Step</span>
</div>

<!-- Tagline -->
<div class="tagline">Shape your future &nbsp;·&nbsp; one step at a time</div>

<!-- Floating particles (JS) -->
<script>
  const body = document.body;
  const colors = ['#e8682a','#b84f1a','#7b3fbf'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    const sz=Math.random()*4+2;
    p.style.cssText=`
      width:${sz}px;height:${sz}px;
      left:${Math.random()*1920}px;
      top:${600+Math.random()*400}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${5+Math.random()*8}s;
      animation-delay:${Math.random()*6}s;
    `;
    body.appendChild(p);
  }
</script>
</body>
</html>
